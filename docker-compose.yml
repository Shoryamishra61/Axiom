services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: scheduler
      POSTGRES_DB: scheduler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
      - ./backend/migrations/002_add_dead_status_and_fix_indexes.sql:/docker-entrypoint-initdb.d/002_add_dead_status_and_fix_indexes.sql
      - ./backend/migrations/003_reliability_constraints.sql:/docker-entrypoint-initdb.d/003_reliability_constraints.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduler"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://scheduler:scheduler@postgres:5432/scheduler
      SECRET_KEY: change-me-in-production
      WORKER_LEASE_SECONDS: 30
      REAPER_INTERVAL_SECONDS: 15
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: ./backend
    command: python -m worker.main
    environment:
      DATABASE_URL: postgresql+asyncpg://scheduler:scheduler@postgres:5432/scheduler
      SECRET_KEY: change-me-in-production
      WORKER_POLL_INTERVAL: 1
      WORKER_LEASE_SECONDS: 30
      WORKER_CONCURRENCY: 5
    depends_on:
      postgres:
        condition: service_healthy
    # ponytail: scaling workers via compose replicas is enough for demo scale
    deploy:
      replicas: 2

  scheduler:
    build: ./backend
    command: python -m scheduler.main
    environment:
      DATABASE_URL: postgresql+asyncpg://scheduler:scheduler@postgres:5432/scheduler
      REAPER_INTERVAL_SECONDS: 15
      MATERIALIZER_INTERVAL_SECONDS: 10
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend

volumes:
  pgdata:
